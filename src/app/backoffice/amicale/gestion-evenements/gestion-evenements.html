<div class="form">

<input
placeholder="Titre"
[(ngModel)]="event.titre"
class="form-control"
/>

<input
placeholder="Lieu"
[(ngModel)]="event.lieu"
class="form-control"
/>

<input
type="date"
[(ngModel)]="event.dateDebut"
class="form-control"
/>

<input
type="date"
[(ngModel)]="event.dateFin"
class="form-control"
/>

<input
type="number"
placeholder="Nombre de places"
[(ngModel)]="event.nbPlaces"
class="form-control"
/>

<input
type="number"
placeholder="Prix"
[(ngModel)]="event.prix"
class="form-control"
/>

<textarea
placeholder="Description"
[(ngModel)]="event.description"
class="form-control"
></textarea>

<input type="file" (change)="onFileSelected($event)" />

<button class="btn btn-success" (click)="createEvent()">
Créer événement
</button>

</div>
