<div class="form-container">

<h1 class="page-title">
  🎯 Ajouter un événement {{ event.typeEvenement ? '(' + event.typeEvenement + ')' : '' }}
</h1>


  <!-- TYPE -->
  <div class="form-group">
    <label>Type d'événement</label>
    <select [(ngModel)]="event.typeEvenement" name="typeEvenement">
      <option value="">Choisir un type</option>
      <option value="OMRA">Omra</option>
      <option value="HAJJ">Hajj</option>
      <option value="VOYAGE">Voyage</option>
      <option value="CONVENTION">Convention</option>
    </select>
  </div>

  <!-- TITRE -->
  <div class="form-group">
    <label>Titre</label>
    <input type="text" [(ngModel)]="event.titre" name="titre" placeholder="Ex: Voyage à Djerba">
  </div>

  <!-- LIEU -->
  <div class="form-group">
    <label>Lieu</label>
    <input type="text" [(ngModel)]="event.lieu" name="lieu" placeholder="Ex: Tunis">
  </div>

  <!-- SOCIETE (CONDITIONNEL) -->
  <div *ngIf="event.typeEvenement === 'CONVENTION'" class="form-group">
    <label>Société partenaire</label>
    <select [(ngModel)]="event.societe" name="societe">
      <option value="Ooredoo">Ooredoo</option>
      <option value="Orange">Orange</option>
      <option value="Telecom">Telecom</option>
      <option value="Autre">Autre</option>
    </select>
  </div>

  <!-- DATES -->
  <div class="form-group">
    <label>Date de début</label>
    <input type="date" [(ngModel)]="event.dateDebut" name="dateDebut">
  </div>

  <div class="form-group">
    <label>Date de fin</label>
    <input type="date" [(ngModel)]="event.dateFin" name="dateFin">
  </div>

  <!-- PLACES -->
  <div class="form-group">
    <label>Nombre maximum</label>
    <input type="number" [(ngModel)]="event.nbPlaces" name="nbPlaces">
  </div>

  <!-- PRIX -->
  <div class="form-group">
    <label>Prix</label>
    <input type="number" [(ngModel)]="event.prix" name="prix">
  </div>

  <!-- DESCRIPTION -->
  <div class="form-group">
    <label>Description</label>
    <textarea rows="4" [(ngModel)]="event.description" name="description"></textarea>
  </div>

  <!-- IMAGE -->
  <div class="form-group">
    <label>Image</label>
    <input type="file" (change)="onFileSelected($event)">
  </div>

  <!-- BUTTON -->
  <button class="btn-modern" (click)="createEvent()">
    Créer l’événement
  </button>

</div>
