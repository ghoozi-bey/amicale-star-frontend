<div class="login-container">

  <div class="login-box">

    <h2>Connexion</h2>

    <label>Email</label>
    <input type="text" [(ngModel)]="user.email">

    <label>Mot de passe</label>
    <input type="password" [(ngModel)]="user.motdepasse">

    <button (click)="login()">Se connecter</button>

  </div>

</div>
